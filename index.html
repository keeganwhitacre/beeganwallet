<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>Couple Finance PWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom Font Integrations */
        @font-face { font-family: 'Saans'; src: url('fonts/Saans-TRIAL-Regular.woff2') format('woff2'); font-weight: 400; font-style: normal; }
        @font-face { font-family: 'Saans'; src: url('fonts/Saans-TRIAL-Medium.woff2') format('woff2'); font-weight: 500; font-style: normal; }
        @font-face { font-family: 'Saans'; src: url('fonts/Saans-TRIAL-SemiBold.woff2') format('woff2'); font-weight: 600; font-style: normal; }
        @font-face { font-family: 'SaansMono'; src: url('fonts/SaansMono-TRIAL-Regular.woff2') format('woff2'); font-weight: 400; font-style: normal; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        html, body {
            background-color: #333333;
            margin: 0;
            font-family: 'Saans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overscroll-behavior: none; /* Stops whole body from rubber-banding */
        }
        
        .theme-transition { transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        
        .slide-up { animation: slideUp 0.35s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .swipe-delete { transition: transform 0.2s ease; }

        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: black;
            cursor: pointer;
            margin-top: -10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(0,0,0,0.3);
            border-radius: 2px;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        saans: ['Saans', 'sans-serif'],
                        mono: ['SaansMono', 'monospace']
                    },
                    colors: {
                        darkBg: '#2A2A2A',
                        darkerBg: '#1C1C1E',
                        bel: '#D4D8F4',
                        keegan: '#B7F900',
                        blueLight: '#CCFDF6',
                        cardGap: '#333333',
                        cardEnd: '#EAFFB0'
                    }
                }
            }
        }
    </script>
</head>
<body class="flex justify-center items-center min-h-screen font-saans font-normal">

    <div id="app" class="w-full max-w-md h-[100dvh] sm:h-[850px] bg-[#333333] text-neutral-900 relative overflow-hidden sm:rounded-[3rem] shadow-2xl sm:border-[8px] sm:border-[#1C1C1E] flex flex-col">
        <!-- Dynamic content injected here -->
    </div>

    <input type="file" id="receipt-upload" accept="image/*" class="hidden" />

    <script>
        // --- Initial Mock Data ---
        const defaultSettings = {
            deviceUser: 'Bel', 
            belVenmo: 'isabelgrace756',
            keeganVenmo: 'keegwhit',
            geminiApiKey: '',
            githubPat: '',
            gistId: ''
        };

        const mockTransactions = [];
        
        const mockLists = [
            {
                id: 'list-1',
                name: 'Apartment Wishlist',
                items: [
                    { id: 'i1', text: 'Tapestry behind bed', checked: false, assignedTo: 'Bel' },
                    { id: 'i2', text: 'Curtains for living room', checked: false, assignedTo: 'Bel' },
                    { id: 'i3', text: 'Rechargeable batteries', checked: true, assignedTo: 'Keegan' }
                ]
            },
            {
                id: 'list-2',
                name: 'Grocery List',
                items: [
                    { id: 'i4', text: 'SALMONNNN', checked: false, assignedTo: 'Bel' },
                    { id: 'i5', text: 'Milk', checked: false, assignedTo: 'Bel' },
                    { id: 'i6', text: 'Yogurt!', checked: false, assignedTo: 'Keegan' },
                    { id: 'i7', text: 'Chips', checked: false, assignedTo: 'Keegan' },
                    { id: 'i8', text: 'Salsa', checked: false, assignedTo: 'Bel' }
                ]
            }
        ];

        // --- Global State ---
        let state = {
            settings: { ...defaultSettings },
            transactions: [],
            lists: [],
            recurring: [],
            currentView: 'home',
            activeTxId: null,
            activeListId: null,
            activeSliderItemId: null,
            modal: null, 
            modalJustOpened: false, 
            isProcessing: false,
            isSyncing: false,
            editingItemId: null
        };

        // --- Persistence / Sync ---
        function loadState() {
            const saved = localStorage.getItem('coupleFinanceState');
            if (saved) {
                const parsed = JSON.parse(saved);
                state.settings = parsed.settings || defaultSettings;
                state.transactions = parsed.transactions || mockTransactions;
                state.lists = parsed.lists || mockLists;
                state.recurring = parsed.recurring || [];
            } else {
                state.transactions = [...mockTransactions];
                state.lists = [...mockLists];
                state.recurring = [];
            }
            checkAutoRecurring();
        }

        function saveState() {
            localStorage.setItem('coupleFinanceState', JSON.stringify({
                settings: state.settings,
                transactions: state.transactions,
                lists: state.lists,
                recurring: state.recurring
            }));
            saveToGist();
        }

        async function saveToGist() {
            const { githubPat, gistId } = state.settings;
            if (!githubPat || !gistId) return;

            const payload = {
                description: "Couple Finance PWA Sync",
                files: {
                    "couple_finance_data.json": {
                        content: JSON.stringify({
                            transactions: state.transactions,
                            lists: state.lists,
                            recurring: state.recurring
                        })
                    }
                }
            };

            try {
                await fetch(`https://api.github.com/gists/${gistId}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `token ${githubPat}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                });
                console.log("Successfully synced to GitHub Gist");
            } catch (e) {
                console.error("Failed to sync to Gist:", e);
            }
        }

        async function loadFromGist() {
            const { githubPat, gistId } = state.settings;
            if (!githubPat || !gistId) return;
            
            try {
                const res = await fetch(`https://api.github.com/gists/${gistId}?t=${Date.now()}`, {
                    headers: {
                        'Authorization': `token ${githubPat}`,
                        'Accept': 'application/vnd.github.v3+json',
                    }
                });
                
                if (!res.ok) throw new Error("Gist fetch failed");
                
                const data = await res.json();
                const file = data.files['couple_finance_data.json'];
                
                if (file) {
                    const parsed = JSON.parse(file.content);
                    if (parsed.transactions) state.transactions = parsed.transactions;
                    if (parsed.lists) state.lists = parsed.lists;
                    if (parsed.recurring) state.recurring = parsed.recurring;
                    
                    localStorage.setItem('coupleFinanceState', JSON.stringify({
                        settings: state.settings,
                        transactions: state.transactions,
                        lists: state.lists,
                        recurring: state.recurring
                    }));
                    checkAutoRecurring();
                }
            } catch (e) {
                console.error("Failed to load from Gist:", e);
            }
        }

        function checkAutoRecurring() {
            let updated = false;
            const now = new Date();
            const currentMonthStr = now.getFullYear() + '-' + now.getMonth();
            const currentDay = now.getDate();

            state.recurring.forEach(bill => {
                if (currentDay >= bill.recurrenceDay && bill.lastPostedMonth !== currentMonthStr) {
                    const newTx = {
                        id: 'tx-' + Date.now().toString() + Math.floor(Math.random()*1000),
                        store: bill.name,
                        date: now.toLocaleDateString('en-US', {month: 'numeric', day: 'numeric', year: '2-digit'}),
                        total: bill.amount,
                        status: bill.payer === 'Bel' ? 'BEL PAID' : 'KEEGAN PAID',
                        splitType: bill.splitType,
                        items: []
                    };
                    state.transactions.unshift(newTx);
                    bill.lastPostedMonth = currentMonthStr;
                    updated = true;
                }
            });

            if (updated) {
                localStorage.setItem('coupleFinanceState', JSON.stringify({
                    settings: state.settings,
                    transactions: state.transactions,
                    lists: state.lists,
                    recurring: state.recurring
                }));
                saveToGist();
            }
        }

        // --- Math & Balances ---
        function getBalances() {
            let belPaid = 0; let keeganPaid = 0;
            let belShare = 0; let keeganShare = 0;
            
            state.transactions.forEach(tx => {
                const isBelPayer = tx.status === 'BEL PAID';
                const isKeeganPayer = tx.status === 'KEEGAN PAID';
                if (!isBelPayer && !isKeeganPayer) return; 

                if (isBelPayer) belPaid += tx.total;
                if (isKeeganPayer) keeganPaid += tx.total;

                if (!tx.items || tx.items.length === 0) {
                    if (tx.splitType === 'Bel') belShare += tx.total;
                    else if (tx.splitType === 'Keegan') keeganShare += tx.total;
                    else { belShare += tx.total / 2; keeganShare += tx.total / 2; }
                } else {
                    let belItems = 0; let keeganItems = 0; let sharedItems = 0;
                    let itemsSum = 0;
                    
                    tx.items.forEach(i => {
                        itemsSum += i.price;
                        if (i.assignedTo === 'Bel') belItems += i.price;
                        else if (i.assignedTo === 'Keegan') keeganItems += i.price;
                        else if (i.assignedTo === 'SPLIT') {
                            const ratio = i.splitRatio !== undefined ? i.splitRatio : 0.5;
                            belItems += i.price * ratio;
                            keeganItems += i.price * (1 - ratio);
                        } else sharedItems += i.price; 
                    });
                    
                    const remainder = tx.total - itemsSum;
                    belShare += belItems + (sharedItems / 2) + (remainder / 2);
                    keeganShare += keeganItems + (sharedItems / 2) + (remainder / 2);
                }
            });

            let belNet = Math.round((belPaid - belShare) * 100) / 100;
            let keeganNet = Math.round((keeganPaid - keeganShare) * 100) / 100;

            return {
                belOwesKeegan: belNet < 0 ? Math.abs(belNet) : 0,
                keeganOwesBel: keeganNet < 0 ? Math.abs(keeganNet) : 0,
                belNet,
                keeganNet
            };
        }

        // --- Helper Functions ---
        function getTheme() {
            if (state.settings.deviceUser === 'Bel') {
                return { primary: 'bg-bel', hex: '#D4D8F4', gradient: 'from-blueLight to-bel', name: 'Bel', partnerVenmo: state.settings.keeganVenmo };
            }
            return { primary: 'bg-keegan', hex: '#B7F900', gradient: 'from-blueLight to-keegan', name: 'Keegan', partnerVenmo: state.settings.belVenmo };
        }

        function getUserColor(userId) {
            if (userId === 'Bel') return '#D4D8F4';
            if (userId === 'Keegan') return '#B7F900';
            if (userId === 'SPLIT') return '#FFFFFF'; 
            return '#1C1C1E'; // Fixed CLAIM color
        }

        function formatMoney(amount) {
            return '$' + Math.abs(parseFloat(amount)).toFixed(2);
        }

        // --- Action Handlers ---
        function toggleActiveUser() {
            state.settings.deviceUser = state.settings.deviceUser === 'Bel' ? 'Keegan' : 'Bel';
            saveState();
            render();
        }

        function switchView(view, txId = null) {
            state.currentView = view;
            if (txId) state.activeTxId = txId;
            render();
        }

        function openModal(modalName) { 
            state.modalJustOpened = true;
            state.modal = modalName; 
            render(); 
            state.modalJustOpened = false;
        }

        function closeModalAnimated() {
            const sheet = document.getElementById('active-modal-sheet');
            const backdrop = document.getElementById('modal-backdrop');
            if (sheet && backdrop) {
                sheet.style.transition = 'transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1)';
                sheet.style.transform = 'translateY(100%)';
                backdrop.style.transition = 'opacity 0.25s ease';
                backdrop.style.opacity = '0';
                setTimeout(() => {
                    state.modal = null;
                    render();
                }, 250);
            } else {
                state.modal = null;
                render();
            }
        }
        
        function closeModal() { 
            state.modal = null; 
            render(); 
        }

        function cycleItemAssignment(itemId) {
            const tx = state.transactions.find(t => t.id === state.activeTxId);
            if (!tx || !tx.items) return;
            const me = state.settings.deviceUser || 'Bel';
            const partner = me === 'Bel' ? 'Keegan' : 'Bel';

            tx.items = tx.items.map(item => {
                if (item.id === itemId) {
                    const next = item.assignedTo === 'CLAIM' ? me : 
                                 item.assignedTo === me ? partner : 
                                 item.assignedTo === partner ? 'CLAIM' : me;
                    return { ...item, assignedTo: next };
                }
                return item;
            });
            saveState();
            render();
        }
        
        function cycleListUser(listId, itemId) {
            const list = state.lists.find(l => l.id === listId);
            if (!list) return;
            const item = list.items.find(i => i.id === itemId);
            if (!item) return;

            const me = state.settings.deviceUser;
            const partner = me === 'Bel' ? 'Keegan' : 'Bel';
            const next = item.assignedTo === 'CLAIM' ? me :
                         item.assignedTo === me ? partner : 'CLAIM';

            item.assignedTo = next;
            saveState();
            render();
        }

        function splitItem(itemId) {
            const tx = state.transactions.find(t => t.id === state.activeTxId);
            if (!tx || !tx.items) return;
            tx.items = tx.items.map(item => {
                if (item.id === itemId) return { ...item, assignedTo: 'SPLIT', splitRatio: 0.5 };
                return item;
            });
            saveState();
            render();
        }

        function deleteItem(itemId) {
            const tx = state.transactions.find(t => t.id === state.activeTxId);
            if (!tx || !tx.items) return;
            
            const itemIndex = tx.items.findIndex(i => i.id === itemId);
            if (itemIndex > -1) {
                tx.total -= tx.items[itemIndex].price;
                tx.items.splice(itemIndex, 1);
            }
            saveState();
            render();
        }

        function handleVenmoPayment(amount) {
            const theme = getTheme();
            const url = `venmo://paycharge?txn=pay&recipients=${theme.partnerVenmo}&amount=${amount}`;
            window.location.href = url;
        }

        // --- Render Functions ---
        function renderPill(status) {
            if (status === 'CLAIM') {
                return `<button class="px-5 py-1.5 rounded-full text-[10px] font-mono tracking-widest uppercase bg-[#1C1C1E] text-white border border-transparent">CLAIM</button>`;
            } else if (status === 'BEL PAID') {
                return `<button class="px-5 py-1.5 rounded-full text-[10px] font-mono tracking-widest uppercase bg-bel text-black border border-black">BEL PAID</button>`;
            } else {
                return `<button class="px-5 py-1.5 rounded-full text-[10px] font-mono tracking-widest uppercase bg-keegan text-black border border-black">KEEGAN PAID</button>`;
            }
        }

        function renderBottomNav() {
            if (state.modal) return '';
            
            const v = state.currentView;
            
            return `
                <div class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-[#1C1C1E] rounded-full p-2 flex items-center justify-between w-[280px] shadow-2xl z-[60] border border-black/30 theme-transition">
                    <button data-action="go-budget" class="flex-1 flex justify-center items-center py-2.5 rounded-full transition-all duration-300 ${v === 'budget' ? `bg-[#CCFDF6] text-black border border-black/20` : 'text-[#B7F900] hover:bg-white/10'}">
                        <i data-lucide="pie-chart" class="w-6 h-6"></i>
                        ${v === 'budget' ? '<span class="font-saans font-medium text-sm ml-2">Budget</span>' : ''}
                    </button>
                    <button data-action="go-home" class="flex-1 flex justify-center items-center py-2.5 rounded-full transition-all duration-300 ${v === 'home' ? `bg-[#EAFFB0] text-black border border-black/20` : 'text-[#EAFFB0] hover:bg-white/10'}">
                        <i data-lucide="home" class="w-[22px] h-[22px]"></i>
                        ${v === 'home' ? '<span class="font-saans font-medium text-sm ml-2">Home</span>' : ''}
                    </button>
                    <button data-action="go-lists" class="flex-1 flex justify-center items-center py-2.5 rounded-full transition-all duration-300 ${v === 'lists' ? `bg-[#CCFDF6] text-black border border-black/20` : 'text-[#D4D8F4] hover:bg-white/10'}">
                        <i data-lucide="file-text" class="w-[22px] h-[22px]"></i>
                        ${v === 'lists' ? '<span class="font-saans font-medium text-sm ml-2">Lists</span>' : ''}
                    </button>
                </div>
            `;
        }

        function renderBudget() {
            const now = new Date();
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();
            const monthName = now.toLocaleString('default', { month: 'long' });

            let thisMonthTotal = 0;
            let belPaid = 0;
            let keeganPaid = 0;
            let storeTotals = {};

            state.transactions.forEach(tx => {
                const txDate = new Date(tx.date); 
                if (txDate.getMonth() === currentMonth && txDate.getFullYear() === currentYear && tx.store !== 'Settlement Payment') {
                    thisMonthTotal += tx.total;
                    if (tx.status === 'BEL PAID') belPaid += tx.total;
                    if (tx.status === 'KEEGAN PAID') keeganPaid += tx.total;
                    
                    if (!storeTotals[tx.store]) storeTotals[tx.store] = 0;
                    storeTotals[tx.store] += tx.total;
                }
            });

            const belPct = thisMonthTotal ? (belPaid / thisMonthTotal) * 100 : 50;
            const keeganPct = thisMonthTotal ? (keeganPaid / thisMonthTotal) * 100 : 50;

            const topStores = Object.entries(storeTotals).sort((a,b) => b[1] - a[1]).slice(0, 3);
            let topStoresHTML = topStores.map(([store, total], i) => `
                <div class="flex justify-between items-center py-3 ${i === topStores.length - 1 ? '' : 'border-b border-white/10'}">
                    <span class="font-saans font-semibold text-[15px] truncate pr-4">${store}</span>
                    <span class="font-mono font-bold text-[15px] shrink-0">${formatMoney(total)}</span>
                </div>
            `).join('');
            if(!topStoresHTML) topStoresHTML = `<p class="opacity-50 my-4 font-saans font-semibold text-center text-sm">No spending data yet.</p>`;

            let billsHTML = (state.recurring || []).map((bill, i) => {
                const suffix = bill.recurrenceDay === 1 || bill.recurrenceDay === 21 || bill.recurrenceDay === 31 ? 'st' : bill.recurrenceDay === 2 || bill.recurrenceDay === 22 ? 'nd' : bill.recurrenceDay === 3 || bill.recurrenceDay === 23 ? 'rd' : 'th';
                return `
                    <div class="flex justify-between items-center py-4 ${i === state.recurring.length - 1 ? '' : 'border-b border-black'} relative">
                        <div class="flex-1 pr-3">
                            <h4 class="font-saans font-semibold text-[16px] leading-tight mb-1 truncate">${bill.name}</h4>
                            <p class="font-saans font-normal text-xs text-black/70">Auto-posts on the ${bill.recurrenceDay}${suffix} • ${bill.payer} pays</p>
                        </div>
                        <div class="flex items-center gap-3 shrink-0">
                            <span class="font-mono font-bold text-[16px]">${formatMoney(bill.amount)}</span>
                            <button data-action="delete-recurring" data-id="${bill.id}" class="text-black/30 hover:text-red-500 transition-colors p-2 -mr-2">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            if(!billsHTML) billsHTML = `<p class="opacity-50 my-6 font-saans font-semibold text-center text-sm">No recurring bills added yet.</p>`;

            return `
                <!-- Sticky Header Container -->
                <div class="bg-gradient-to-br from-blueLight to-bel shrink-0 rounded-b-[2.5rem] px-6 pt-[calc(env(safe-area-inset-top)+2rem)] pb-8 relative z-20 shadow-[0_8px_30px_rgba(0,0,0,0.12)] border-b border-black/10">
                    <div class="flex justify-between items-center mb-6">
                        <h1 class="text-[3rem] leading-none font-saans font-semibold tracking-tight">Budget</h1>
                    </div>
                    
                    <div class="border border-black rounded-2xl p-5 relative overflow-hidden bg-white/40 backdrop-blur-md">
                        <div class="flex justify-between items-end relative z-10 mb-4">
                            <div>
                                <p class="text-[10px] font-mono tracking-widest uppercase mb-1">${monthName} Spending</p>
                                <h2 class="text-5xl font-mono tracking-tighter">${formatMoney(thisMonthTotal)}</h2>
                            </div>
                        </div>
                        
                        <div class="flex justify-between text-[10px] font-mono uppercase tracking-widest mb-1.5 text-black/70">
                            <span>Bel: ${formatMoney(belPaid)}</span>
                            <span>Keegan: ${formatMoney(keeganPaid)}</span>
                        </div>
                        <div class="w-full h-3 rounded-full flex overflow-hidden border border-black/20 bg-white/40">
                            <div class="h-full bg-bel border-r border-black/20" style="width: ${belPct}%"></div>
                            <div class="h-full bg-keegan" style="width: ${keeganPct}%"></div>
                        </div>
                    </div>
                </div>

                <!-- Scrollable Content Container -->
                <div id="main-scroll" class="flex-1 overflow-y-auto no-scrollbar w-full bg-[#333333] relative z-10 -mt-[2.5rem] pt-[calc(2.5rem+1.5rem)] pb-32">
                    <div class="mx-6 rounded-[2rem] p-6 bg-gradient-to-br from-cardEnd to-bel border border-black/10 shadow-sm theme-transition relative z-10">
                        <div class="flex justify-between items-end border-b border-black pb-2 mb-4">
                            <h3 class="font-saans font-semibold text-lg leading-none">Recurring Bills</h3>
                            <button data-action="open-recurring-form" class="bg-transparent text-black font-mono text-[10px] uppercase tracking-widest active:scale-95 transition-transform">
                                Add +
                            </button>
                        </div>
                        <div class="flex flex-col">
                            ${billsHTML}
                        </div>
                    </div>

                    <div class="mx-6 mt-4 rounded-[2rem] p-6 bg-[#1C1C1E] text-white border border-black/30 shadow-sm theme-transition relative z-10">
                        <div class="flex justify-between items-end border-b border-white/20 pb-2 mb-3">
                            <h3 class="font-saans font-semibold text-lg leading-none">Top Places</h3>
                            <span class="text-[9px] font-mono tracking-widest uppercase text-white/50">This Month</span>
                        </div>
                        <div class="flex flex-col">
                            ${topStoresHTML}
                        </div>
                    </div>
                </div>
                ${renderBottomNav()}
            `;
        }

        function renderHome() {
            const theme = getTheme();
            const balances = getBalances();
            const myNet = state.settings.deviceUser === 'Bel' ? balances.belNet : balances.keeganNet;
            const balanceLabel = myNet >= 0 ? 'You Are Owed' : 'You Owe';
            
            let actionButtonHTML = '';
            if (myNet < 0) {
                actionButtonHTML = `
                    <button data-action="open-settle" class="bg-white text-black border border-black px-5 py-2.5 rounded-full text-xs font-mono tracking-wide flex items-center gap-2 active:scale-95 transition-transform shadow-sm">

            // Unified Modal Wrapper Pattern
            return `
                <div class="absolute inset-0 z-50 flex flex-col justify-end pointer-events-none">

                    <div id="active-modal-sheet" class="bg-gradient-to-br ${wrapperGradient} w-full ${modalHeight} rounded-t-[2.5rem] flex flex-col relative pointer-events-auto ${animationClass} shadow-[0_-10px_40px_rgba(0,0,0,0.3)]">
                        <!-- Hit area for drag to dismiss -->
                        <div id="modal-drag-area" class="w-full pt-5 pb-3 flex justify-center shrink-0 touch-none">
                            <div class="w-12 h-1.5 bg-black/20 rounded-full"></div>
                        </div>
                        <div id="modal-scroll-area" class="overflow-y-auto no-scrollbar flex-1 px-6 pb-12">

        }

        let previousViewForScroll = state.currentView;

        function render() {
            const app = document.getElementById('app');
            const mainScroll = document.getElementById('main-scroll');
            const mainScrollPos = mainScroll ? mainScroll.scrollTop : 0;

            let content = '';
            if (state.currentView === 'home') content = renderHome();
            else if (state.currentView === 'lists') content = renderLists();
            else if (state.currentView === 'budget') content = renderBudget();
            else content = renderDetails();
            
            app.innerHTML = content + renderModals();
            
            const newMainScroll = document.getElementById('main-scroll');
            if (newMainScroll && previousViewForScroll === state.currentView) newMainScroll.scrollTop = mainScrollPos;
            previousViewForScroll = state.currentView;

            lucide.createIcons();
            attachGestures();
            attachDragAndDrop();
        }

        // --- Gestures (Swipe) ---
        function attachGestures() {
            const swipeables = document.querySelectorAll('[data-swipeable="true"]');
            swipeables.forEach(el => {
                let startX = 0; let currentX = 0;
                el.addEventListener('touchstart', (e) => {
                    startX = e.touches[0].clientX;
                    el.style.transition = 'none';
                }, {passive: true});

                el.addEventListener('touchmove', (e) => {
                    currentX = e.touches[0].clientX - startX;
                    if (currentX < 0) el.style.transform = `translateX(${currentX}px)`;
                }, {passive: true});

                el.addEventListener('touchend', () => {
                    el.style.transition = 'transform 0.2s ease';
                    if (currentX < -80) {
                        el.style.transform = `translateX(-100%)`;
                        setTimeout(() => {
                            const listId = el.getAttribute('data-list-id');
                            if (listId) {
                                const itemId = el.getAttribute('data-item-id');
                                const list = state.lists.find(l => l.id === listId);
                                if (list) {
                                    list.items = list.items.filter(i => i.id !== itemId);
                                    saveState();
                                    render();
                                }
                            } else {
                                deleteItem(el.getAttribute('data-id'));
                            }
                        }, 200);
                    } else {
                        el.style.transform = `translateX(0)`;
                    }
                });
            });

            // Long Press for Split Slider
            const splitBtns = document.querySelectorAll('[data-action="split-item"]');
            splitBtns.forEach(btn => {
                let timer;
                const startPress = (e) => {
                    timer = setTimeout(() => {
                        window.isLongPress = true;
                        state.activeSliderItemId = btn.getAttribute('data-id');
                        openModal('split-slider');
                    }, 400);
                };
                const endPress = () => clearTimeout(timer);
                
                btn.addEventListener('touchstart', startPress, {passive: true});
                btn.addEventListener('touchend', endPress);
                btn.addEventListener('mousedown', startPress);
                btn.addEventListener('mouseup', endPress);
                btn.addEventListener('mouseleave', endPress);
                btn.addEventListener('touchmove', endPress, {passive: true});
            });

            // Modal Drag to Dismiss
            const modalSheet = document.getElementById('active-modal-sheet');
            const modalScroll = document.getElementById('modal-scroll-area');
            const backdrop = document.getElementById('modal-backdrop');
            
            if (modalSheet && modalScroll) {
                let startY = 0;
                let currentY = 0;
                let isDragging = false;
                let startTime = 0;

                const onTouchStart = (e) => {
                    // Only allow sheet drag down if the content inside is scrolled to top
                    if (modalScroll.scrollTop <= 0) {
                        startY = e.touches[0].clientY;
                        currentY = 0;
                        isDragging = true;
                        startTime = Date.now();
                        modalSheet.style.transition = 'none';
                        if (backdrop) backdrop.style.transition = 'none';
                    }
                };

                const onTouchMove = (e) => {
                    if (!isDragging) return;
                    currentY = e.touches[0].clientY - startY;
                    
                    if (currentY > 0) {
                        if (modalScroll.scrollTop <= 0) {
                            e.preventDefault(); // Stop scrolling the modal body
                            modalSheet.style.transform = `translateY(${currentY}px)`;
                            if (backdrop) backdrop.style.opacity = Math.max(0, 1 - (currentY / window.innerHeight));
                        } else {
                            // If they scrolled down, cancel the drag
                            isDragging = false;
                            modalSheet.style.transform = `translateY(0)`;
                            if (backdrop) backdrop.style.opacity = '1';
                        }
                    } else {
                         currentY = 0; // Don't drag upwards
                    }
                };

                const onTouchEnd = () => {
                    if (!isDragging) return;
                    isDragging = false;
                    const timeElapsed = Date.now() - startTime;
                    const velocity = currentY / timeElapsed;
                    
                    if (currentY > 150 || velocity > 0.5) {
                        closeModalAnimated(); // Hand over to our out-animator
                    } else {
                        // Spring back into place
                        modalSheet.style.transition = 'transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1)';
                        modalSheet.style.transform = `translateY(0)`;
                        if (backdrop) {
                            backdrop.style.transition = 'opacity 0.3s ease';
                            backdrop.style.opacity = '1';
                        }
                    }
                };

                modalSheet.addEventListener('touchstart', onTouchStart, { passive: true });
                modalSheet.addEventListener('touchmove', onTouchMove, { passive: false });
                modalSheet.addEventListener('touchend', onTouchEnd);
            }
        }

        // --- Custom Touch-Based Drag and Drop for Lists on iOS ---
        let listDragState = { active: false, node: null, id: null, startY: 0, currentTop: 0 };

        // Global listeners for touch move/end across the whole document
        document.addEventListener('touchmove', (e) => {
            if (!listDragState.active || !listDragState.node) return;
            e.preventDefault(); // crucial to prevent page scrolling while dragging
            
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const deltaY = clientY - listDragState.startY;
            let newTop = listDragState.currentTop + deltaY;
            listDragState.node.style.top = `${newTop}px`;

            // Calculate index hover
            let currentIndex = state.lists.findIndex(l => l.id === listDragState.id);
            let hoverIndex = Math.round(newTop / 115);
            hoverIndex = Math.max(0, Math.min(hoverIndex, state.lists.length - 1));

            // Swap instantly via array shifting
            if (hoverIndex !== currentIndex) {
                const [moved] = state.lists.splice(currentIndex, 1);
                state.lists.splice(hoverIndex, 0, moved);
                
                // Readjust offsets for a seamless pickup
                listDragState.currentTop = hoverIndex * 115 + (newTop - hoverIndex * 115);
                listDragState.startY = clientY;
                
                // Animate ungrabbed cards to their new indexes
                document.querySelectorAll('[data-list-card="true"]').forEach(otherCard => {
                    if (otherCard === listDragState.node) return;
                    const otherId = otherCard.getAttribute('data-id');
                    const otherIndex = state.lists.findIndex(l => l.id === otherId);
                    otherCard.style.transition = 'top 0.3s cubic-bezier(0.2, 0.8, 0.2, 1)';
                    otherCard.style.top = `${otherIndex * 115}px`;
                    otherCard.style.zIndex = `${otherIndex}`;
                });
            }
        }, { passive: false });

        const endListDrag = () => {
            if (!listDragState.active || !listDragState.node) return;
            
            const finalIndex = state.lists.findIndex(l => l.id === listDragState.id);
            listDragState.node.style.transition = 'all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1)';
            listDragState.node.style.top = `${finalIndex * 115}px`;
            listDragState.node.style.zIndex = `${finalIndex}`;
            listDragState.node.classList.remove('scale-[0.98]', 'opacity-95', 'shadow-[0_20px_50px_rgba(0,0,0,0.5)]');
            
            listDragState = { active: false, node: null, id: null, startY: 0, currentTop: 0 };
            saveState();
            
            setTimeout(() => render(), 300); // clean re-render to normalize DOM structure
        };

        document.addEventListener('touchend', endListDrag);
        document.addEventListener('touchcancel', endListDrag);
        
        // Setup triggers
        function attachDragAndDrop() {
            const cards = document.querySelectorAll('[data-list-card="true"]');
            cards.forEach(card => {
                const handle = card.querySelector('.drag-handle');
                if (!handle) return;

                const startDrag = (e) => {
                    e.preventDefault();
                    e.stopPropagation(); // prevent modal from popping up
                    
                    listDragState.active = true;
                    listDragState.node = card;
                    listDragState.id = card.getAttribute('data-id');
                    listDragState.startY = e.touches ? e.touches[0].clientY : e.clientY;
                    listDragState.currentTop = parseInt(card.style.top) || 0;

                    card.style.transition = 'none';
                    card.style.zIndex = '100';
                    card.classList.add('scale-[0.98]', 'opacity-95', 'shadow-[0_20px_50px_rgba(0,0,0,0.5)]');
                };

                handle.addEventListener('touchstart', startDrag, { passive: false });
                handle.addEventListener('mousedown', startDrag); // Desktop fallback support
            });
        }

        // --- Event Delegation ---
        document.addEventListener('click', async (e) => {
            const btn = e.target.closest('button, div[data-action]');
            if (!btn) return;
            
            const action = btn.getAttribute('data-action');
            if (action === 'toggle-user') toggleActiveUser(); 
            else if (action === 'refresh-data') {
                state.isSyncing = true;
                render();
                await loadFromGist();
                state.isSyncing = false;
                render();
            }
            else if (action === 'open-all') openModal('all');
            else if (action === 'view-details') { closeModalAnimated(); switchView('details', btn.getAttribute('data-id')); }
            else if (action === 'go-home') { closeModalAnimated(); switchView('home'); }
            else if (action === 'go-budget') { closeModalAnimated(); switchView('budget'); }
            else if (action === 'go-lists') { closeModalAnimated(); switchView('lists'); }
            else if (action === 'open-settings') openModal('settings');
            else if (action === 'open-manual') openModal('manual');
            else if (action === 'open-settle') openModal('settle');
            else if (action === 'open-add-item') { state.editingItemId = null; openModal('item-form'); }
            else if (action === 'open-edit-item') { state.editingItemId = btn.getAttribute('data-id'); openModal('item-form'); }
            
            // Settlement Flow
            else if (action === 'confirm-settle') openModal('confirm-settle');
            else if (action === 'execute-settle') {
                const amount = parseFloat(btn.getAttribute('data-amount'));
                const payer = state.settings.deviceUser;
                const beneficiary = payer === 'Bel' ? 'Keegan' : 'Bel';
                const newTx = {
                    id: 'tx-' + Date.now().toString(),
                    store: 'Settlement Payment',
                    date: new Date().toLocaleDateString('en-US', {month: 'numeric', day: 'numeric', year: '2-digit'}),
                    total: amount,
                    status: payer === 'Bel' ? 'BEL PAID' : 'KEEGAN PAID',
                    splitType: beneficiary,
                    items: []
                };
                state.transactions.unshift(newTx);
                saveState();
                closeModalAnimated();
            }

            // Trip Deletion Flow
            else if (action === 'open-edit-tx') openModal('edit-tx');
            else if (action === 'delete-tx') openModal('confirm-delete-tx');
            else if (action === 'execute-delete-tx') {
                state.transactions = state.transactions.filter(t => t.id !== state.activeTxId);
                saveState(); closeModalAnimated(); switchView('home');
            }
            
            // List Deletion Flow
            else if (action === 'open-list') { state.activeListId = btn.getAttribute('data-list-id'); openModal('list-detail'); }
            else if (action === 'delete-list') openModal('confirm-delete-list');
            else if (action === 'execute-delete-list') {
                state.lists = state.lists.filter(l => l.id !== state.activeListId);
                saveState(); closeModalAnimated(); switchView('lists');
            }

            // Recurring Bills Flow
            else if (action === 'open-recurring-form') openModal('recurring-form');
            else if (action === 'delete-recurring') {
                if (confirm('Delete this recurring bill?')) {
                    state.recurring = state.recurring.filter(b => b.id !== btn.getAttribute('data-id'));
                    saveState();
                    render();
                }
            }

            // Standard List / Item Logic
            else if (action === 'close-modal') closeModalAnimated();
            else if (action === 'create-list') {
                const newList = { id: 'list-' + Date.now(), name: 'New List', items: [] };
                state.lists.unshift(newList);
                state.activeListId = newList.id;
                saveState();
                openModal('list-detail');
            }
            else if (action === 'toggle-list-item') {
                const list = state.lists.find(l => l.id === btn.getAttribute('data-list-id'));
                const item = list.items.find(i => i.id === btn.getAttribute('data-item-id'));
                if (item) { item.checked = !item.checked; saveState(); render(); }
            }
            else if (action === 'cycle-item') cycleItemAssignment(btn.getAttribute('data-id'));
            else if (action === 'split-item') {
                if (!window.isLongPress) splitItem(btn.getAttribute('data-id'));
                window.isLongPress = false;
            }
            else if (action === 'save-split-ratio') {
                const val = document.getElementById('split-slider-input').value;
                const tx = state.transactions.find(t => t.id === state.activeTxId);
                if (tx && tx.items) {
                    const item = tx.items.find(i => i.id === state.activeSliderItemId);
                    if (item) {
                        item.assignedTo = 'SPLIT';
                        item.splitRatio = parseInt(val) / 100;
                    }
                }
                saveState();
                closeModalAnimated();
            }
            else if (action === 'cycle-list-user') {
                cycleListUser(btn.getAttribute('data-list-id'), btn.getAttribute('data-item-id'));
            }
            else if (action === 'add-list-item') {
                const list = state.lists.find(l => l.id === btn.getAttribute('data-list-id'));
                if (list) {
                    list.items.push({ id: 'item-' + Date.now(), text: 'New Item', checked: false, assignedTo: 'CLAIM' });
                    saveState(); render();
                }
            }
        });

        // Content Editable Auto-save
        document.addEventListener('blur', (e) => {
            if (e.target.hasAttribute('data-edit-list-name')) {
                const list = state.lists.find(l => l.id === e.target.getAttribute('data-id'));
                if (list) { list.name = e.target.innerText; saveState(); }
            }
            if (e.target.hasAttribute('data-edit-item-text')) {
                const list = state.lists.find(l => l.id === e.target.getAttribute('data-list-id'));
                const item = list.items.find(i => i.id === e.target.getAttribute('data-item-id'));
                if (item) { item.text = e.target.innerText; saveState(); }
            }
        }, true);

        // Settings & Form Save function bindings
        window.handleSettingsSave = function(e) {
            e.preventDefault();
            const fd = new FormData(e.target);
            state.settings.deviceUser = fd.get('deviceUser');
            state.settings.geminiApiKey = fd.get('gemini');
            state.settings.githubPat = fd.get('pat');
            state.settings.gistId = fd.get('gist');
            saveState();
            closeModalAnimated();
        }

        window.handleManualSave = function(e) {
            e.preventDefault();
            const fd = new FormData(e.target);
            const newTx = {
                id: 'tx-' + Date.now().toString(),
                store: fd.get('store'),
                date: new Date().toLocaleDateString('en-US', {month: 'numeric', day: 'numeric', year: '2-digit'}),
                total: parseFloat(fd.get('total')),
                status: fd.get('payer') === 'Bel' ? 'BEL PAID' : 'KEEGAN PAID',
                splitType: fd.get('splitType'),
                items: []
            };
            state.transactions.unshift(newTx);
            saveState();
            closeModalAnimated();
        }

        window.handleRecurringSave = function(e) {
            e.preventDefault();
            const fd = new FormData(e.target);
            const newBill = {
                id: 'rec-' + Date.now().toString(),
                name: fd.get('name'),
                amount: parseFloat(fd.get('amount')),
                payer: fd.get('payer'),
                splitType: fd.get('splitType'),
                recurrenceDay: parseInt(fd.get('recurrenceDay')),
                lastPostedMonth: null
            };
            state.recurring.push(newBill);
            saveState();
            closeModalAnimated();
            checkAutoRecurring(); // Trigger check immediately in case the day has passed
            render();
        }

        window.handleEditTxSave = function(e) {
            e.preventDefault();
            const fd = new FormData(e.target);
            const tx = state.transactions.find(t => t.id === state.activeTxId);
            if (tx) {
                tx.store = fd.get('store');
                tx.date = fd.get('date');
                tx.total = parseFloat(fd.get('total'));
                tx.status = fd.get('payer') === 'Bel' ? 'BEL PAID' : 'KEEGAN PAID';
                tx.splitType = fd.get('splitType');
            }
            saveState();
            closeModalAnimated();
        }

        window.handleItemSave = function(e) {
            e.preventDefault();
            const fd = new FormData(e.target);
            const tx = state.transactions.find(t => t.id === state.activeTxId);
            if (!tx) return;

            if (state.editingItemId) {
                const item = tx.items.find(i => i.id === state.editingItemId);
                if (item) {
                    item.name = fd.get('name');
                    item.price = parseFloat(fd.get('price'));
                }
            } else {
                tx.items = tx.items || [];
                tx.items.push({
                    id: 'item-' + Date.now().toString(),
                    name: fd.get('name'),
                    price: parseFloat(fd.get('price')),
                    assignedTo: 'CLAIM'
                });
            }
            saveState();
            closeModalAnimated();
        }

        // Initialize App
        loadState();
        render();

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => console.log('SW registered:', registration))
                    .catch(error => console.log('SW registration failed:', error));
            });
        }
    </script>
</body>
</html>
