<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Beegan Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* App-like behavior fixes */
        body {
            background-color: #333333;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overscroll-behavior: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            position: fixed;
            inset: 0;
        }

        #app {
            height: 100dvh;
            width: 100vw;
        }
        
        .theme-transition { transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        
        .slide-up { animation: slideUp 0.35s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .swipe-delete { transition: transform 0.2s ease; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#2A2A2A',
                        darkerBg: '#1C1C1E',
                        bel: '#D4D8F4',
                        keegan: '#B7F900',
                        blueLight: '#CCFDF6',
                        cardGap: '#333333'
                    }
                }
            }
        }
    </script>
</head>
<body class="flex justify-center items-center">

    <!-- App Container -->
    <div id="app" class="w-full max-w-md bg-[#333333] text-neutral-900 relative overflow-hidden sm:rounded-[3rem] shadow-2xl sm:border-[8px] sm:border-[#1C1C1E] flex flex-col mx-auto">
        <!-- Dynamic content injected here -->
    </div>

    <input type="file" id="receipt-upload" accept="image/*" class="hidden" />

    <script>
        // --- Initial Mock Data ---
        const defaultSettings = {
            deviceUser: 'Bel', 
            belVenmo: 'isabelgrace756',
            keeganVenmo: 'keegwhit',
            geminiApiKey: '',
            githubPat: '',
            gistId: ''
        };

        const mockTransactions = [];
        const mockLists = [
            {
                id: 'list1', title: 'Apartment Wishlist',
                items: [
                    { id: 'li1', name: 'Tapestry behind bed', checked: false, assignedTo: 'Bel' },
                    { id: 'li2', name: 'Curtains for living room', checked: false, assignedTo: 'Bel' },
                    { id: 'li3', name: 'Rechargeable batteries', checked: true, assignedTo: 'Keegan' },
                    { id: 'li4', name: 'Nightstand lamp', checked: false, assignedTo: 'Keegan' }
                ]
            },
            {
                id: 'list2', title: 'Grocery List',
                items: [
                    { id: 'li5', name: 'SALMONNNNN', checked: false, assignedTo: 'Bel' },
                    { id: 'li6', name: 'Milk', checked: false, assignedTo: 'Bel' },
                    { id: 'li7', name: 'Yogurt!', checked: false, assignedTo: 'Keegan' },
                    { id: 'li8', name: 'Chips', checked: false, assignedTo: 'Keegan' },
                    { id: 'li9', name: 'Salsa', checked: false, assignedTo: 'Bel' }
                ]
            }
        ];

        // --- Global State ---
        let state = {
            settings: { ...defaultSettings },
            transactions: [],
            lists: [...mockLists],
            currentView: 'home',
            activeTxId: null,
            activeListId: null,
            modal: null, 
            isProcessing: false,
            editingItemId: null
        };

        // --- Persistence / Sync ---
        function loadState() {
            const saved = localStorage.getItem('coupleFinanceState');
            if (saved) {
                const parsed = JSON.parse(saved);
                state.settings = parsed.settings || defaultSettings;
                state.transactions = parsed.transactions || mockTransactions;
                state.lists = parsed.lists || mockLists;
            } else {
                state.transactions = [...mockTransactions];
                state.lists = [...mockLists];
            }
        }

        function saveState() {
            localStorage.setItem('coupleFinanceState', JSON.stringify({
                settings: state.settings,
                transactions: state.transactions,
                lists: state.lists
            }));
            syncToGist();
        }

        async function syncToGist() {
            const { githubPat, gistId, deviceUser } = state.settings;
            if (!githubPat || !gistId) return;
            console.log(`Syncing to Gist as ${deviceUser}...`, { gistId, payload: state.transactions });
        }

        // --- Math & Balances ---
        function getBalances() {
            let belPaid = 0; let keeganPaid = 0;
            let belShare = 0; let keeganShare = 0;
            
            state.transactions.forEach(tx => {
                const isBelPayer = tx.status === 'BEL PAID';
                const isKeeganPayer = tx.status === 'KEEGAN PAID';
                if (!isBelPayer && !isKeeganPayer) return; 

                if (isBelPayer) belPaid += tx.total;
                if (isKeeganPayer) keeganPaid += tx.total;

                if (!tx.items || tx.items.length === 0) {
                    if (tx.splitType === 'Bel') belShare += tx.total;
                    else if (tx.splitType === 'Keegan') keeganShare += tx.total;
                    else { belShare += tx.total / 2; keeganShare += tx.total / 2; }
                } else {
                    let belItems = 0; let keeganItems = 0; let sharedItems = 0;
                    let itemsSum = 0;
                    
                    tx.items.forEach(i => {
                        itemsSum += i.price;
                        if (i.assignedTo === 'Bel') belItems += i.price;
                        else if (i.assignedTo === 'Keegan') keeganItems += i.price;
                        else if (i.assignedTo === 'SPLIT') {
                            const custom = i.customSplit || { Bel: 50, Keegan: 50 };
                            belItems += i.price * (custom.Bel / 100);
                            keeganItems += i.price * (custom.Keegan / 100);
                        }
                        else sharedItems += i.price; // Handles 'CLAIM'
                    });
                    
                    const remainder = tx.total - itemsSum;
                    belShare += belItems + (sharedItems / 2) + (remainder / 2);
                    keeganShare += keeganItems + (sharedItems / 2) + (remainder / 2);
                }
            });

            let belNet = Math.round((belPaid - belShare) * 100) / 100;
            let keeganNet = Math.round((keeganPaid - keeganShare) * 100) / 100;

            return {
                belOwesKeegan: belNet < 0 ? Math.abs(belNet) : 0,
                keeganOwesBel: keeganNet < 0 ? Math.abs(keeganNet) : 0,
                belNet,
                keeganNet
            };
        }

        // --- Helper Functions ---
        function getTheme() {
            if (state.settings.deviceUser === 'Bel') {
                return { primary: 'bg-bel', hex: '#D4D8F4', gradient: 'from-blueLight to-bel', name: 'Bel', partnerVenmo: state.settings.keeganVenmo };
            }
            return { primary: 'bg-keegan', hex: '#B7F900', gradient: 'from-blueLight to-keegan', name: 'Keegan', partnerVenmo: state.settings.belVenmo };
        }

        function getUserColor(userId) {
            if (userId === 'Bel') return '#D4D8F4';
            if (userId === 'Keegan') return '#B7F900';
            if (userId === 'SPLIT') return '#FFFFFF'; 
            return '#1C1C1E'; // CLAIM
        }

        function formatMoney(amount) {
            return '$' + Math.abs(parseFloat(amount)).toFixed(2);
        }

        // --- Action Handlers ---
        function toggleActiveUser() {
            state.settings.deviceUser = state.settings.deviceUser === 'Bel' ? 'Keegan' : 'Bel';
            saveState();
            render();
        }

        function switchView(view, id = null) {
            state.currentView = view;
            if (view === 'details' || view === 'edit-tx') state.activeTxId = id;
            if (view === 'list-detail') state.activeListId = id;
            render();
        }

        function openModal(modalName) { state.modal = modalName; render(); }
        function closeModal() { state.modal = null; render(); }

        // --- Transaction Actions ---
        function cycleItemAssignment(itemId) {
            const tx = state.transactions.find(t => t.id === state.activeTxId);
            if (!tx || !tx.items) return;
            tx.items = tx.items.map(item => {
                if (item.id === itemId) {
                    const next = item.assignedTo === 'CLAIM' ? 'Bel' : 
                                 item.assignedTo === 'Bel' ? 'Keegan' : 
                                 item.assignedTo === 'Keegan' ? 'CLAIM' : 'Bel';
                    return { ...item, assignedTo: next, customSplit: null };
                }
                return item;
            });
            saveState();
            render();
        }

        function splitItem(itemId) {
            const tx = state.transactions.find(t => t.id === state.activeTxId);
            if (!tx || !tx.items) return;
            tx.items = tx.items.map(item => {
                if (item.id === itemId) return { ...item, assignedTo: 'SPLIT', customSplit: { Bel: 50, Keegan: 50 } };
                return item;
            });
            saveState();
            render();
        }

        function deleteItem(itemId) {
            const tx = state.transactions.find(t => t.id === state.activeTxId);
            if (!tx || !tx.items) return;
            const itemIndex = tx.items.findIndex(i => i.id === itemId);
            if (itemIndex > -1) {
                tx.total -= tx.items[itemIndex].price;
                tx.items.splice(itemIndex, 1);
            }
            saveState();
            render();
        }

        // --- List Actions ---
        function toggleListCheckbox(listId, itemId) {
            const list = state.lists.find(l => l.id === listId);
            const item = list.items.find(i => i.id === itemId);
            item.checked = !item.checked;
            saveState();
            render();
        }

        function cycleListAssignment(listId, itemId) {
            const list = state.lists.find(l => l.id === listId);
            const item = list.items.find(i => i.id === itemId);
            item.assignedTo = item.assignedTo === 'Bel' ? 'Keegan' : 'Bel';
            saveState();
            render();
        }

        function handleVenmoPayment(amount) {
            const theme = getTheme();
            const currentMonth = new Date().toLocaleString('default', { month: 'long' });
            const url = `venmo://paycharge?txn=pay&recipients=${theme.partnerVenmo}&amount=${amount}&note=${currentMonth}%20Rent%20and%20Bills%20🏡`;
            window.location.href = url;
        }

        // --- Form Handlers ---
        function handleSettingsSave(e) {
            e.preventDefault();
            const fd = new FormData(e.target);
            state.settings.deviceUser = fd.get('deviceUser');
            state.settings.geminiApiKey = fd.get('gemini');
            state.settings.githubPat = fd.get('pat');
            state.settings.gistId = fd.get('gist');
            saveState();
            closeModal();
        }

        function handleManualSave(e) {
            e.preventDefault();
            const fd = new FormData(e.target);
            const newTx = {
                id: Date.now().toString(),
                store: fd.get('store'),
                date: new Date().toLocaleDateString('en-US', {month: 'numeric', day: 'numeric', year: '2-digit'}),
                total: parseFloat(fd.get('total')),
                status: fd.get('payer') === 'Bel' ? 'BEL PAID' : 'KEEGAN PAID',
                splitType: fd.get('splitType'),
                items: []
            };
            state.transactions.unshift(newTx);
            saveState();
            closeModal();
        }

        function handleEditTxSave(e) {
            e.preventDefault();
            const fd = new FormData(e.target);
            const tx = state.transactions.find(t => t.id === state.activeTxId);
            if (tx) {
                tx.store = fd.get('store');
                tx.date = fd.get('date');
                tx.total = parseFloat(fd.get('total'));
                tx.status = fd.get('payer') === 'Bel' ? 'BEL PAID' : 'KEEGAN PAID';
                tx.splitType = fd.get('splitType');
            }
            saveState();
            closeModal();
        }

        function handleItemSave(e) {
            e.preventDefault();
            const fd = new FormData(e.target);
            const tx = state.transactions.find(t => t.id === state.activeTxId);
            if (!tx) return;

            if (state.editingItemId) {
                const item = tx.items.find(i => i.id === state.editingItemId);
                if (item) {
                    item.name = fd.get('name');
                    item.price = parseFloat(fd.get('price'));
                }
            } else {
                tx.items = tx.items || [];
                tx.items.push({
                    id: Date.now().toString(),
                    name: fd.get('name'),
                    price: parseFloat(fd.get('price')),
                    assignedTo: 'CLAIM'
                });
            }
            saveState();
            closeModal();
        }

        function handleSplitSave() {
            const slider = document.getElementById('split-slider-input');
            const belVal = parseInt(slider.value);
            const tx = state.transactions.find(t => t.id === state.activeTxId);
            const item = tx.items.find(i => i.id === state.editingItemId);
            item.assignedTo = 'SPLIT';
            item.customSplit = { Bel: belVal, Keegan: 100 - belVal };
            saveState();
            closeModal();
        }

        // --- Render Functions ---
        function renderPill(status) {
            if (status === 'CLAIM') {
                return `<button class="px-5 py-1.5 rounded-full text-[10px] font-bold tracking-widest uppercase bg-[#1C1C1E] text-white border border-transparent">CLAIM</button>`;
            } else if (status === 'BEL PAID') {
                return `<button class="px-5 py-1.5 rounded-full text-[10px] font-bold tracking-widest uppercase bg-bel text-black border border-black">BEL PAID</button>`;
            } else {
                return `<button class="px-5 py-1.5 rounded-full text-[10px] font-bold tracking-widest uppercase bg-keegan text-black border border-black">KEEGAN PAID</button>`;
            }
        }

        function renderBottomNav() {
            const theme = getTheme();
            const isHome = state.currentView === 'home' || state.currentView === 'details';
            const isLists = state.currentView === 'lists' || state.currentView === 'list-detail';
            
            return `
                <div class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-darkerBg rounded-full px-3 py-2 flex items-center justify-between w-[280px] shadow-xl z-[60] border border-black/20 theme-transition">
                    <button class="p-3 text-white/50 hover:text-white transition-colors">
                        <i data-lucide="dollar-sign" class="w-6 h-6"></i>
                    </button>
                    <button data-action="go-home" class="flex items-center gap-2 px-5 py-3 rounded-full transition-all duration-300 ${isHome ? `bg-gradient-to-br ${theme.gradient} text-black border border-black` : 'text-white/50 hover:text-white'}">
                        <i data-lucide="home" class="w-5 h-5"></i>
                        ${isHome ? '<span class="font-bold text-sm">Home</span>' : ''}
                    </button>
                    <button data-action="go-lists" class="flex items-center gap-2 px-5 py-3 rounded-full transition-all duration-300 ${isLists ? `bg-gradient-to-br ${theme.gradient} text-black border border-black` : 'text-white/50 hover:text-white'}">
                        <i data-lucide="file-text" class="w-5 h-5"></i>
                        ${isLists ? '<span class="font-bold text-sm">Lists</span>' : ''}
                    </button>
                </div>
            `;
        }

        function renderHome() {
            const theme = getTheme();
            const balances = getBalances();
            const myNet = state.settings.deviceUser === 'Bel' ? balances.belNet : balances.keeganNet;
            
            const balanceLabel = myNet >= 0 ? 'You Are Owed' : 'You Owe';
            
            let actionButtonHTML = '';
            if (myNet < 0) {
                actionButtonHTML = `
                    <button data-action="open-settle" class="bg-white text-black border border-black px-5 py-2.5 rounded-full text-xs font-bold tracking-wide flex items-center gap-2 active:scale-95 transition-transform shadow-sm">
                        SETTLE <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </button>`;
            } else {
                 actionButtonHTML = `
                    <button class="bg-white/50 text-black/50 border border-black/20 px-5 py-2.5 rounded-full text-xs font-bold tracking-wide flex items-center gap-2 cursor-default">
                        ALL GOOD <i data-lucide="check" class="w-4 h-4"></i>
                    </button>`;
            }
            
            const nonSettlements = state.transactions.filter(tx => tx.store !== 'Settlement Payment');
            const txList = nonSettlements.slice(0, 5);
            
            let txHTML = txList.map((tx, i) => `
                <div class="flex items-center justify-between pb-3 ${i === txList.length - 1 ? '' : 'border-b border-black mb-3'}" 
                     data-action="view-details" data-id="${tx.id}" style="cursor: pointer;">
                    <div class="flex items-center gap-3">
                        <i data-lucide="shopping-cart" class="w-7 h-7"></i>
                        <div>
                            <h4 class="text-[1.65rem] leading-none font-extrabold tracking-tighter">${formatMoney(tx.total)}</h4>
                            <p class="text-[11px] font-semibold mt-0.5">
                                <span class="font-extrabold">${tx.date}</span> ${tx.store}
                            </p>
                        </div>
                    </div>
                    <div>${renderPill(tx.status)}</div>
                </div>
            `).join('');

            if (!txHTML) {
                txHTML = `<div class="text-center text-black/50 font-bold py-6 italic opacity-70">No purchases yet.</div>`;
            }

            return `
                <div id="main-scroll" class="flex-1 overflow-y-auto no-scrollbar pb-[140px] w-full theme-transition bg-[#333333]">
                    <div class="bg-gradient-to-br ${theme.gradient} rounded-b-[2.5rem] px-6 pt-[calc(env(safe-area-inset-top)+3rem)] pb-8 relative shadow-sm border-b border-black/10">
                        <div class="flex justify-between items-center mb-6">
                            <h1 class="text-[2.5rem] leading-none font-extrabold tracking-tight">Hello, ${theme.name}!</h1>
                            <div class="flex gap-2">
                                <div data-action="open-settings" class="w-5 h-5 rounded-full bg-white/80 cursor-pointer hover:scale-105" title="Settings"></div>
                                <div data-action="toggle-user" class="w-5 h-5 rounded-full bg-white cursor-pointer shadow-sm hover:scale-105 border border-black/10" title="Switch User"></div>
                            </div>
                        </div>

                        <div class="border border-black rounded-2xl p-5 relative overflow-hidden bg-white/40 backdrop-blur-md">
                            <div class="flex justify-between items-end relative z-10">
                                <div>
                                    <p class="text-[10px] font-bold tracking-widest uppercase mb-1">${balanceLabel}</p>
                                    <h2 class="text-5xl font-extrabold tracking-tighter">${formatMoney(myNet)}</h2>
                                </div>
                                ${actionButtonHTML}
                            </div>
                        </div>
                    </div>

                    <div class="flex gap-3 px-6 mt-6">
                        <button onclick="document.getElementById('receipt-upload').click()" class="flex-1 bg-darkerBg text-white rounded-[1.25rem] py-4 flex justify-center items-center gap-2 font-semibold active:scale-95 transition-transform border border-black/50">
                            ${state.isProcessing ? `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Parsing...` : `<i data-lucide="scan" class="w-5 h-5"></i> Upload Receipt`}
                        </button>
                        <button data-action="open-manual" class="flex-1 bg-darkerBg text-white rounded-[1.25rem] py-4 flex justify-center items-center gap-2 font-semibold active:scale-95 transition-transform border border-black/50">
                            <i data-lucide="calculator" class="w-5 h-5"></i> Manual Entry
                        </button>
                    </div>
                    
                    <div class="mx-6 mt-6 rounded-[2rem] p-6 bg-gradient-to-br ${theme.gradient} border border-black/10 shadow-sm theme-transition">
                        <div class="flex justify-between items-end border-b border-black pb-2 mb-4 sticky top-0 bg-transparent backdrop-blur-md z-10 pt-2">
                            <h3 class="font-bold text-lg leading-none">Recent</h3>
                            <button data-action="open-all" class="text-[9px] font-bold tracking-widest uppercase flex items-center gap-1 active:opacity-50 p-2 -mr-2 bg-white/20 rounded-full">
                                SHOW ALL <i data-lucide="arrow-right" class="w-3 h-3"></i>
                            </button>
                        </div>
                        <div class="flex flex-col">${txHTML}</div>
                    </div>

                    <div class="flex gap-4 px-6 mt-6 mb-6">
                        <div class="flex-1 bg-keegan rounded-xl p-4 border border-black/20 shadow-sm flex flex-col justify-between">
                            <p class="text-[9px] font-bold tracking-widest uppercase mb-1 leading-tight">Keegan<br/>Owes Bel</p>
                            <h3 class="text-3xl font-extrabold tracking-tighter mt-2">${formatMoney(balances.keeganOwesBel)}</h3>
                        </div>
                        <div class="flex-1 bg-bel rounded-xl p-4 border border-black/20 shadow-sm flex flex-col justify-between">
                            <p class="text-[9px] font-bold tracking-widest uppercase mb-1 leading-tight">Bel<br/>Owes Keegan</p>
                            <h3 class="text-3xl font-extrabold tracking-tighter mt-2">${formatMoney(balances.belOwesKeegan)}</h3>
                        </div>
                    </div>
                </div>
                ${renderBottomNav()}
            `;
        }

        function renderDetails() {
            const tx = state.transactions.find(t => t.id === state.activeTxId) || state.transactions[0];
            if (!tx) return `<div class="flex-1 flex justify-center items-center text-white">No data</div>`;

            const topGradient = 'from-[#D4D8F4] to-[#B7F900]';
            const bottomGradient = 'from-[#B7F900] to-[#D4D8F4]';

            let itemsHTML = (tx.items || []).map((item, index) => {
                const isSplit = item.assignedTo === 'SPLIT';
                const isClaim = item.assignedTo === 'CLAIM';
                
                let userName = item.assignedTo;
                if (isClaim) userName = 'CLAIM';
                if (isSplit) {
                    const custom = item.customSplit || { Bel: 50, Keegan: 50 };
                    userName = custom.Bel === 50 && custom.Keegan === 50 ? '50 / 50' : `${custom.Bel} / ${custom.Keegan}`;
                }

                const topBgColor = isSplit ? '#FFFFFF' : getUserColor(item.assignedTo);
                const topTextColor = isClaim ? 'text-white' : 'text-black';
                const topBorderClass = isClaim ? 'border-transparent' : 'border-black';
                
                const splitBtnBg = isSplit ? 'bg-black text-white' : 'bg-white text-black';

                return `
                    <div data-swipeable="true" data-id="${item.id}" class="flex justify-between items-start pb-4 relative ${index === tx.items.length - 1 ? '' : 'border-b border-black'} swipe-delete">
                        <div class="flex-1 pr-4 max-w-[70%] cursor-pointer" data-action="open-edit-item" data-id="${item.id}" title="Tap to edit item">
                            <h4 class="font-bold text-[14px] leading-tight mb-1 line-clamp-2">${item.name}</h4>
                            <p class="text-sm font-medium">${formatMoney(item.price)}</p>
                        </div>
                        <div class="flex flex-col gap-1.5 w-[90px] shrink-0">
                            <button data-action="cycle-item" data-id="${item.id}" 
                                class="w-full py-1.5 rounded-full text-[10px] font-bold tracking-widest uppercase transition-colors border ${topBorderClass} ${topTextColor}"
                                style="background-color: ${topBgColor};">
                                ${userName.substring(0,7)}
                            </button>
                            <button data-action="split-item" data-longpress="split" data-id="${item.id}" class="w-full ${splitBtnBg} py-1.5 rounded-full text-[10px] font-bold tracking-widest uppercase border border-black transition-colors active:scale-95">
                                SPLIT
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            if (!itemsHTML) itemsHTML = `<p class="text-sm italic opacity-50">No individual items available. Entire receipt is automatically split according to settings.</p>`;

            itemsHTML += `
                <button data-action="open-add-item" class="w-full py-3 mt-4 border-2 border-dashed border-black/30 rounded-xl font-bold uppercase tracking-widest text-xs flex justify-center items-center gap-2 active:scale-95 transition-transform hover:bg-black/5">
                    <i data-lucide="plus" class="w-4 h-4"></i> Add Item
                </button>
            `;

            return `
                <div class="flex-1 flex flex-col w-full bg-[#333333] overflow-hidden">
                    <div class="bg-gradient-to-br ${topGradient} rounded-b-[2.5rem] relative z-10 shrink-0 shadow-sm">
                        <div class="px-6 pt-[calc(env(safe-area-inset-top)+2rem)] pb-3 flex items-center gap-3">

        let previousViewForScroll = state.currentView;

        function render() {
            const app = document.getElementById('app');
            
            // Save scroll positions before rendering to prevent jumping
            const mainScroll = document.getElementById('main-scroll');
            const mainScrollPos = mainScroll ? mainScroll.scrollTop : 0;

            let content = '';
            if (state.currentView === 'home') content = renderHome();
            else if (state.currentView === 'details') content = renderDetails();
            else if (state.currentView === 'lists') content = renderListsHome();
            else if (state.currentView === 'list-detail') content = renderListDetail();

            app.innerHTML = content + renderModals();
            
            // Restore scroll positions if we didn't change views
            const newMainScroll = document.getElementById('main-scroll');
            if (newMainScroll && previousViewForScroll === state.currentView) newMainScroll.scrollTop = mainScrollPos;
            
            previousViewForScroll = state.currentView;

            lucide.createIcons();
            attachGestures();
        }

        // --- Gestures (Swipe & Long Press) ---
        function attachGestures() {
            // Swipe
            const swipeables = document.querySelectorAll('[data-swipeable="true"]');
            swipeables.forEach(el => {
                let startX = 0; let currentX = 0;
                
                el.addEventListener('touchstart', (e) => {
                    startX = e.touches[0].clientX;
                    el.style.transition = 'none';
                }, {passive: true});

                el.addEventListener('touchmove', (e) => {
                    currentX = e.touches[0].clientX - startX;
                    if (currentX < 0) el.style.transform = `translateX(${currentX}px)`;
                }, {passive: true});

                el.addEventListener('touchend', () => {
                    el.style.transition = 'transform 0.2s ease';
                    if (currentX < -80) {
                        el.style.transform = `translateX(-100%)`;
                        setTimeout(() => deleteItem(el.getAttribute('data-id')), 200);
                    } else {
                        el.style.transform = `translateX(0)`;
                    }
                });
            });

            // Long Press for custom split
            const splitBtns = document.querySelectorAll('[data-longpress="split"]');
            splitBtns.forEach(el => {
                let timer;
                el.addEventListener('touchstart', (e) => {
                    timer = setTimeout(() => {
                        state.editingItemId = el.getAttribute('data-id');
                        openModal('split-slider');
                    }, 500); // Trigger after 500ms
                }, {passive: true});
                el.addEventListener('touchend', () => clearTimeout(timer));
                el.addEventListener('touchmove', () => clearTimeout(timer));
            });
        }

        // --- Event Delegation ---
        document.addEventListener('click', (e) => {
            const btn = e.target.closest('button, div[data-action]');
            if (!btn) return;
            
            const action = btn.getAttribute('data-action');
            if (action === 'toggle-user') toggleActiveUser();
            else if (action === 'open-all') openModal('all');
            else if (action === 'view-details') { closeModal(); switchView('details', btn.getAttribute('data-id')); }
            else if (action === 'go-home') { closeModal(); switchView('home'); }
            else if (action === 'go-lists') { closeModal(); switchView('lists'); }
            else if (action === 'view-list') { closeModal(); switchView('list-detail', btn.getAttribute('data-id')); }
            else if (action === 'open-settings') openModal('settings');
            else if (action === 'open-manual') openModal('manual');
            else if (action === 'open-settle') openModal('settle');
            else if (action === 'open-edit-tx') openModal('edit-tx');
            else if (action === 'open-add-item') { state.editingItemId = null; openModal('item-form'); }
            else if (action === 'open-edit-item') { state.editingItemId = btn.getAttribute('data-id'); openModal('item-form'); }
            else if (action === 'close-modal') closeModal();
            else if (action === 'delete-tx') {
                state.transactions = state.transactions.filter(t => t.id !== state.activeTxId);
                saveState();
                closeModal();
                switchView('home');
            }
            else if (action === 'cycle-item') cycleItemAssignment(btn.getAttribute('data-id'));
            else if (action === 'split-item') splitItem(btn.getAttribute('data-id'));
            else if (action === 'toggle-list-item') toggleListCheckbox(btn.getAttribute('data-list-id'), btn.getAttribute('data-item-id'));
            else if (action === 'cycle-list-item') {
                // Prevent the toggle from firing when hitting the button
                e.stopPropagation();
                cycleListAssignment(btn.getAttribute('data-list-id'), btn.getAttribute('data-item-id'));
            }
            else if (action === 'mark-settled') {
                const amount = parseFloat(btn.getAttribute('data-amount'));
                const payer = state.settings.deviceUser;
                const beneficiary = payer === 'Bel' ? 'Keegan' : 'Bel';
                const newTx = {
                    id: Date.now().toString(),
                    store: 'Settlement Payment',
                    date: new Date().toLocaleDateString('en-US', {month: 'numeric', day: 'numeric', year: '2-digit'}),
                    total: amount,
                    status: payer === 'Bel' ? 'BEL PAID' : 'KEEGAN PAID',
                    splitType: beneficiary,
                    items: []
                };
                state.transactions.unshift(newTx);
                saveState();
                closeModal();
            }
        });

        // --- Receipt Processing ---
        document.getElementById('receipt-upload').addEventListener('change', async (e) => {
            if (!e.target.files.length) return;
            const file = e.target.files[0];
            e.target.value = ''; 
            
            state.isProcessing = true;
            render();

            const apiKey = state.settings.geminiApiKey;
            
            // 1. Mock handling if no API key is set
            if (!apiKey) {
                setTimeout(() => {
                    const newTx = {
                        id: Date.now().toString(), store: 'Mocked Upload', date: new Date().toLocaleDateString('en-US', {month: 'numeric', day: 'numeric', year: '2-digit'}), total: 45.00, status: state.settings.deviceUser === 'Bel' ? 'BEL PAID' : 'KEEGAN PAID',
                        items: [
                            { id: Date.now()+'1', name: 'Oat Milk', price: 5.50, assignedTo: 'CLAIM' },
                            { id: Date.now()+'2', name: 'Coffee Beans', price: 18.00, assignedTo: 'CLAIM' }
                        ]
                    };
                    state.transactions.unshift(newTx);
                    state.isProcessing = false;
                    saveState();
                    switchView('details', newTx.id);
                }, 1000);
                return;
            }

            // 2. Real Gemini API handling
            try {
                // Properly await the file reader conversion
                const getBase64 = (file) => new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.onerror = error => reject(error);
                });

                const base64Data = await getBase64(file);
                
                const payload = {
                    contents: [{
                        role: "user",
                        parts: [
                            { text: "Extract line items from this receipt. Return ONLY a JSON array with objects containing 'name' (string) and 'price' (number). Exclude tax/tip. No markdown blocks." },
                            { inlineData: { mimeType: file.type, data: base64Data } }
                        ]
                    }],
                    generationConfig: { responseMimeType: "application/json" }
                };

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();
                const extractedText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                
                if (extractedText) {
                    const itemsArr = JSON.parse(extractedText);
                    let sum = 0;
                    const items = itemsArr.map((item, i) => {
                        sum += item.price;
                        return { id: Date.now() + i.toString(), name: item.name, price: item.price, assignedTo: 'CLAIM' };
                    });
                    
                    const newTx = {
                        id: Date.now().toString(), 
                        store: 'Scanned Receipt', 
                        date: new Date().toLocaleDateString('en-US', {month: 'numeric', day: 'numeric', year: '2-digit'}), 
                        total: sum, 
                        status: state.settings.deviceUser === 'Bel' ? 'BEL PAID' : 'KEEGAN PAID', 
                        items
                    };
                    
                    state.transactions.unshift(newTx);
                    saveState();
                    switchView('details', newTx.id);
                } else {
                    throw new Error("No text returned from Gemini");
                }
            } catch (error) {
                console.error("Receipt processing error:", error);
                alert("Failed to parse receipt. Please double-check your API Key in Settings.");
            } finally {
                state.isProcessing = false;
                render();
            }
        });

        // Initialize App
        loadState();
        render();
    </script>
</body>
</html>
